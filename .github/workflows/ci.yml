name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ruff
        run: uv tool install ruff

      - name: Run ruff linter
        run: uv tool run ruff check services/ --exclude services/news-signal/fine_tuning.py

      - name: Run ruff formatter check
        run: uv tool run ruff format --check services/ --exclude services/news-signal/fine_tuning.py

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Test trades service
        working-directory: services/trades
        run: |
          uv sync --frozen --no-dev
          uv add pytest --dev
          uv run pytest tests/ -v

      - name: Test candles service
        working-directory: services/candles
        run: |
          uv sync --frozen --no-dev
          uv add pytest --dev
          uv run pytest tests/ -v

      - name: Test price-predictor service
        working-directory: services/price-predictor
        run: |
          uv sync --frozen --no-dev
          uv add pytest --dev
          uv run pytest tests/ -v

      - name: Test monitoring-service
        working-directory: services/monitoring-service
        run: |
          uv sync --frozen --no-dev
          uv add pytest --dev
          uv run pytest tests/ -v